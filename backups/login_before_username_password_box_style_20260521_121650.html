      --muted:#cbd5e1;

    body{

    .login-page{

<body>
  <main class="login-page">
    <section class="login-panel">
      <form class="login-card" method="post">
        {% csrf_token %}
<!-- 
        <div class="login-logo">🗺️</div> -->
        <h1 >🗺️ GIS Digital Twin</h1>

        <label for="username">Username</label>
        <input id="username" name="username" placeholder="Username" required autofocus>

        <label for="password">Password</label>
        <div class="password-wrap">
          <input id="password" name="password" type="password" placeholder="Password" required>
          <button type="button" class="eye-btn" id="togglePassword" aria-label="Show password" title="Show password">👁️</button>
        </div>

        <button class="login-btn" type="submit">Log in</button>



        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
      </form>
    </section>
  </main>

  <script>
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");

    if (passwordInput && togglePassword) {
      togglePassword.addEventListener("click", function () {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        togglePassword.textContent = isHidden ? "🙈" : "👁";
        togglePassword.title = isHidden ? "Hide password" : "Show password";
        togglePassword.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
      });
    }
  </script>
</body>
</html>
